<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulación Inorgánica</title>
    <link rel="icon" href="formInor.png" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f4f8;
      }
      .container {
        text-align: center;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
      }
      h1 {
        font-size: 24px;
        color: #333;
      }
      .formula {
        font-size: 20px;
        font-weight: bold;
        margin: 20px 0;
      }
      input[type="text"] {
        width: calc(100% - 20px);
        max-width: 300px;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      input[disabled] {
        background-color: #e9ecef;
        cursor: not-allowed;
      }
      button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background-color: #007bff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      button:hover {
        background-color: #0056b3;
      }
      .result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
      }
      .correct-answers {
        margin-top: 10px;
        font-size: 16px;
        color: #555;
        text-align: center;
      }
      .correct-answers p {
        margin: 5px 0;
      }
      .navigation {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
      }
      .navigation button {
        padding: 10px;
        border-radius: 50%;
        background-color: #28a745;
        font-size: 16px;
      }
      .navigation button:hover {
        background-color: #218838;
      }
      .progress {
        font-size: 16px;
        margin: 0 10px;
      }
      .finish-button {
        display: none;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background-color: #28a745;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .finish-button:hover {
        background-color: #218838;
      }
      .timer {
        font-size: 16px;
        color: #555;
        margin-top: 10px;
      }
      .all-answers-button {
        display: none;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background-color: #ffc107;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .all-answers-button:hover {
        background-color: #e0a800;
      }
    </style>
  </head>
  <body>
    <div class="container" id="test-container">
      <h1>Formulación Inorgánica</h1>
      <div class="timer" id="timer">Tiempo: 0:00</div>
      <div class="formula" id="formula"></div>
      <input type="text" id="answer" placeholder="Escribe tu respuesta aquí" />
      <button id="check-button">Corregir</button>
      <div class="result" id="result"></div>
      <div class="correct-answers" id="correct-answers"></div>
      <div class="navigation" id="navigation">
        <button id="prev-button">←</button>
        <span class="progress" id="progress"></span>
        <button id="next-button">→</button>
      </div>
      <button class="finish-button" id="finish-button">Volver a Inicio</button>
      <button class="all-answers-button" id="all-answers-button">
        Ver todas las respuestas
      </button>
    </div>
    <div id="all-answers-container" style="display: none"></div>
    <script>
      const formulas = [
        {
          formula: "HMnO<sub>4</sub>",
          answers: [
            "ácido permangánico",
            "hidrógeno (tetraoxidomanganato)",
            "hidróxido trióxido manganeso",
          ],
        },
        {
          formula: "H<sub>2</sub>SO<sub>2</sub>",
          answers: [
            "ácido hiposulfuroso",
            "dihidrógeno (dióxido sulfato)",
            "dihidróxido azufre",
          ],
        },
        {
          formula: "HNO<sub>3</sub>",
          answers: [
            "ácido nítrico",
            "hidrógeno (trioxidonitrato)",
            "hidróxido dióxido nitrógeno",
          ],
        },
        {
          formula: "H<sub>2</sub>SO<sub>4</sub>",
          answers: [
            "ácido sulfúrico",
            "dihidrógeno (tetraóxidosulfato)",
            "dihidróxido dióxido azufre",
          ],
        },
        {
          formula: "HIO<sub>4</sub>",
          answers: [
            "ácido peryódico",
            "hidrógeno (tetraoxidoyodato)",
            "hidróxido trióxido yodo",
          ],
        },
        {
          formula: "HIO",
          answers: [
            "ácido hipoyodoso",
            "hidrógeno (oxidoyodato)",
            "hidróxido yodo",
          ],
        },
        {
          formula: "H<sub>2</sub>TeO<sub>3</sub>",
          answers: [
            "ácido teluroso",
            "dihidrógeno (trioxidotelurato)",
            "dihidróxido óxido telurio",
          ],
        },
      ];

      const totalQuestions = formulas.length;
      let selectedFormulas = formulas.sort(() => 0.5 - Math.random());
      let userAnswers = Array(totalQuestions).fill("");
      let answerStates = Array(totalQuestions).fill(null);
      let displayedAnswers = Array(totalQuestions).fill("");
      let currentIndex = 0;
      let timerInterval;
      let secondsElapsed = 0;

      function formatTime(seconds) {
        const minutes = Math.floor(seconds / 60);
        const secondsLeft = seconds % 60;
        return `${minutes}:${secondsLeft.toString().padStart(2, "0")}`;
      }

      function startTimer() {
        timerInterval = setInterval(() => {
          secondsElapsed++;
          document.getElementById("timer").textContent = `Tiempo: ${formatTime(
            secondsElapsed
          )}`;
        }, 1000);
      }

      function stopTimer() {
        clearInterval(timerInterval);
      }

      function updateUI() {
        const answerInput = document.getElementById("answer");
        const checkButton = document.getElementById("check-button");
        const result = document.getElementById("result");
        const correctAnswers = document.getElementById("correct-answers");
        const finishButton = document.getElementById("finish-button");
        const allAnswersButton = document.getElementById("all-answers-button");
        const navigation = document.getElementById("navigation");
        const progress = document.getElementById("progress");

        if (currentIndex < totalQuestions) {
          const currentFormula = selectedFormulas[currentIndex];
          const userAnswer = userAnswers[currentIndex];

          document.getElementById("formula").innerHTML = currentFormula.formula;
          progress.textContent = `${currentIndex + 1}/${totalQuestions}`;
          answerInput.value = userAnswer || "";
          answerInput.disabled = answerStates[currentIndex] !== null;
          checkButton.disabled = answerStates[currentIndex] !== null;

          if (answerStates[currentIndex] === true) {
            result.textContent = "¡Correcto!";
            result.style.color = "#28a745";
            correctAnswers.innerHTML = displayedAnswers[currentIndex];
          } else if (answerStates[currentIndex] === false) {
            result.textContent = "Incorrecto.";
            result.style.color = "#dc3545";
            correctAnswers.innerHTML = displayedAnswers[currentIndex];
          } else {
            result.textContent = "";
            result.style.color = "";
            correctAnswers.innerHTML = "";
          }

          navigation.style.display = "flex";
          finishButton.style.display = "none";
          allAnswersButton.style.display = "none";
        } else {
          stopTimer();

          const correctCount = answerStates.filter(
            (state) => state === true
          ).length;

          document.getElementById(
            "formula"
          ).textContent = `¡Has terminado el test! Respuestas correctas: ${correctCount}/${totalQuestions}`;
          result.textContent = "";
          correctAnswers.innerHTML = "";

          // Ocultar elementos al finalizar
          answerInput.style.display = "none";
          checkButton.style.display = "none";
          navigation.style.display = "none";
          progress.style.display = "none";

          finishButton.style.display = "block";
          allAnswersButton.style.display = "block";
        }
      }

      function checkAnswer() {
        const answerInput = document.getElementById("answer");
        const userAnswer = normalize(answerInput.value.trim());
        const validAnswers =
          selectedFormulas[currentIndex].answers.map(normalize);
        const correctAnswersElement =
          document.getElementById("correct-answers");

        answerStates[currentIndex] = validAnswers.includes(userAnswer);
        document.getElementById("result").textContent = answerStates[
          currentIndex
        ]
          ? "¡Correcto!"
          : "Incorrecto.";
        document.getElementById("result").style.color = answerStates[
          currentIndex
        ]
          ? "#28a745"
          : "#dc3545";

        const answersHTML = selectedFormulas[currentIndex].answers
          .map((answer) => `<p>${answer}</p>`)
          .join("");
        correctAnswersElement.innerHTML = `<h3>Respuestas correctas:</h3>${answersHTML}`;
        displayedAnswers[
          currentIndex
        ] = `<h3>Respuestas correctas:</h3>${answersHTML}`;

        userAnswers[currentIndex] = answerInput.value.trim();
        answerInput.disabled = true;
        document.getElementById("check-button").disabled = true;
      }

      function normalize(text) {
        return text
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/\s+/g, " ");
      }

      function showAllAnswers() {
        const answersContainer = document.getElementById(
          "all-answers-container"
        );
        answersContainer.innerHTML = `
                <div class="answers-container">
                    <h2>Todas las Respuestas</h2>
                    ${selectedFormulas
                      .map(
                        (formula, index) => `
                        <div>
                            <strong>${index + 1}. ${
                          formula.formula
                        }</strong><br />
                            Respuestas: ${formula.answers.join(", ")}
                        </div>
                    `
                      )
                      .join("")}
                    <button class="back-button" id="back-to-test-button">Volver</button>
                </div>
            `;
        document.getElementById("test-container").style.display = "none";
        answersContainer.style.display = "block";

        document
          .getElementById("back-to-test-button")
          .addEventListener("click", () => {
            answersContainer.style.display = "none";
            document.getElementById("test-container").style.display = "block";
          });
      }

      document
        .getElementById("check-button")
        .addEventListener("click", checkAnswer);
      document.getElementById("next-button").addEventListener("click", () => {
        if (currentIndex < totalQuestions - 1) {
          currentIndex++;
          updateUI();
        } else {
          stopTimer();
          document.getElementById("formula").textContent =
            "¡Has terminado el test!";
          document.getElementById("answer").style.display = "none";
          document.getElementById("check-button").style.display = "none";
          document.getElementById("finish-button").style.display = "block";
          document.getElementById("all-answers-button").style.display = "block";
          document.getElementById("result").textContent = "";
          document.getElementById("correct-answers").innerHTML = "";
        }
      });
      document.getElementById("prev-button").addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
        }
        updateUI();
      });
      document.getElementById("finish-button").addEventListener("click", () => {
        window.location.href = "indice.html";
      });
      document
        .getElementById("all-answers-button")
        .addEventListener("click", showAllAnswers);

      startTimer();
      updateUI();
    </script>
  </body>
</html>
