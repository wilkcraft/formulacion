<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulación Inorgánica</title>
    <link rel="icon" href="formInor.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
        }
        .container {
            text-align: center;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            color: #333;
        }
        .formula {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
        }
        input[type="text"] {
            width: calc(100% - 20px);
            max-width: 300px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        input[disabled] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .correct-answers {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
            text-align: center;
        }
        .correct-answers p {
            margin: 5px 0;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .navigation button {
            padding: 10px;
            border-radius: 50%;
            background-color: #28a745;
            font-size: 16px;
        }
        .navigation button:hover {
            background-color: #218838;
        }
        .progress {
            font-size: 16px;
            margin: 0 10px;
        }
        .finish-button {
            display: none;
            padding: 10px 20px;
            font-size: 16px;
            color: #fff;
            background-color: #28a745;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .finish-button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulación Inorgánica</h1>
        <div class="formula" id="formula"></div>
        <input type="text" id="answer" placeholder="Escribe tu respuesta aquí" />
        <button id="check-button">Corregir</button>
        <div class="result" id="result"></div>
        <div class="correct-answers" id="correct-answers"></div>
        <div class="navigation">
            <button id="prev-button">←</button>
            <span class="progress" id="progress"></span>
            <button id="next-button">→</button>
        </div>
        <button class="finish-button" id="finish-button">Volver a Inicio</button>
    </div>
    <script>
        const formulas = [
            { formula: "HMnO<sub>4</sub>", answers: ["acido permanganico", "hidrogeno (tetraoxidomanganato)", "hidroxido trioxido manganeso"] },
            { formula: "H<sub>2</sub>SO<sub>2</sub>", answers: ["acido hiposulfuroso", "dihidrogeno (dioxido sulfato)", "dihidroxido azufre"] },
            { formula: "HNO<sub>3</sub>", answers: ["acido nitrico", "hidrogeno (trioxidonitrato)", "hidroxido dioxido nitrogeno"] },
            { formula: "H<sub>2</sub>SO<sub>4</sub>", answers: ["acido sulfurico", "dihidrogeno (tetraoxidosulfato)", "dihidroxido dioxido azufre"] },
            { formula: "HIO<sub>4</sub>", answers: ["acido peryodico", "hidrogeno (tetraoxidoyodato)", "hidroxido trioxido yodo"] },
            { formula: "HIO", answers: ["acido hipoyodoso", "hidrogeno (oxidoyodato)", "hidroxido yodo"] },
            { formula: "H<sub>2</sub>TeO<sub>3</sub>", answers: ["acido teluroso", "dihidrogeno (trioxidotelurato)", "dihidroxido oxido telurio"] }
        ];

        const totalQuestions = formulas.length;
        let selectedFormulas = formulas.sort(() => 0.5 - Math.random());
        let userAnswers = Array(totalQuestions).fill("");
        let answerStates = Array(totalQuestions).fill(null);
        let displayedAnswers = Array(totalQuestions).fill(null); // Guarda las respuestas mostradas
        let currentIndex = 0;

        function capitalize(text) {
            return text.charAt(0).toUpperCase() + text.slice(1);
        }

        function updateUI() {
            const answerInput = document.getElementById("answer");
            const checkButton = document.getElementById("check-button");
            const result = document.getElementById("result");
            const correctAnswers = document.getElementById("correct-answers");
            const navigation = document.querySelector(".navigation");

            if (currentIndex < totalQuestions) {
                const currentFormula = selectedFormulas[currentIndex];
                const userAnswer = userAnswers[currentIndex];

                document.getElementById("formula").innerHTML = currentFormula.formula;
                document.getElementById("progress").textContent = `${currentIndex + 1}/${totalQuestions}`;
                answerInput.value = userAnswer || "";
                answerInput.disabled = answerStates[currentIndex] !== null;
                checkButton.disabled = answerStates[currentIndex] !== null;

                result.textContent = answerStates[currentIndex] === true
                    ? "¡Correcto!"
                    : answerStates[currentIndex] === false
                    ? "Incorrecto."
                    : "";

                result.style.color = answerStates[currentIndex] === true
                    ? "#28a745"
                    : answerStates[currentIndex] === false
                    ? "#dc3545"
                    : "";

                // Muestra respuestas si ya se corrigió esta pregunta
                correctAnswers.innerHTML = displayedAnswers[currentIndex] || "";

                document.getElementById("finish-button").style.display = "none";
                navigation.style.display = "flex";
            } else {
                document.getElementById("formula").textContent = "¡Has terminado el test!";
                result.textContent = "";
                correctAnswers.innerHTML = "";
                navigation.style.display = "none";
                document.getElementById("finish-button").style.display = "block";
            }
        }

        function checkAnswer() {
            const answerInput = document.getElementById("answer");
            const userAnswer = normalize(answerInput.value.trim());
            const validAnswers = selectedFormulas[currentIndex].answers.map(normalize);
            const resultElement = document.getElementById("result");
            const correctAnswers = document.getElementById("correct-answers");

            if (validAnswers.includes(userAnswer)) {
                answerStates[currentIndex] = true;
                resultElement.textContent = "¡Correcto!";
                resultElement.style.color = "#28a745";
            } else {
                answerStates[currentIndex] = false;
                resultElement.textContent = "Incorrecto.";
                resultElement.style.color = "#dc3545";
            }

            // Mostrar todas las respuestas correctas al verificar y guardarlas
            const formattedAnswers = selectedFormulas[currentIndex].answers
                .map(answer => `<p>${capitalize(answer)}</p>`)
                .join("");
            correctAnswers.innerHTML = formattedAnswers;
            displayedAnswers[currentIndex] = formattedAnswers; // Guarda las respuestas mostradas

            userAnswers[currentIndex] = answerInput.value.trim();
            answerInput.disabled = true;
            document.getElementById("check-button").disabled = true;
        }

        function normalize(text) {
            return text
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/\s+/g, " ");
        }

        document.getElementById("check-button").addEventListener("click", checkAnswer);
        document.getElementById("next-button").addEventListener("click", () => {
            if (currentIndex < totalQuestions - 1) {
                currentIndex++;
            } else if (currentIndex === totalQuestions - 1) {
                currentIndex++; // Incrementar el índice para llegar a la pantalla final
            }
            updateUI();
        });
        document.getElementById("prev-button").addEventListener("click", () => {
            if (currentIndex > 0) {
                currentIndex--;
            }
            updateUI();
        });
        document.getElementById("answer").addEventListener("input", () => {
            document.getElementById("check-button").disabled = false;
        });
        document.getElementById("answer").addEventListener("keypress", (event) => {
            if (event.key === "Enter" && !document.getElementById("check-button").disabled) {
                event.preventDefault();
                checkAnswer();
            }
        });
        document.getElementById("finish-button").addEventListener("click", () => {
            window.location.href = "indice.html";
        });
            
        updateUI();
    </script>
</body>
</html>
