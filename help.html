<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator</title>
    <link rel="icon" href="index.png" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f4f8;
      }
      .container {
        text-align: center;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 24px;
        color: #333;
      }
      button {
        display: inline-block;
        position: relative;
        height: 3.5em;
        padding: 0 1em;
        border: 3px ridge #149cea;
        outline: none;
        background-color: transparent;
        color: black;
        transition: 1s;
        border-radius: 0.3em;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        white-space: nowrap;
        margin: 10px; /* Añade margen entre los botones */
      }

      button:not(.btn)::after {
        content: "";
        position: absolute;
        top: -10px;
        left: 3%;
        width: 95%;
        height: 40%;
        background-color: white;
        transition: 0.5s;
        transform-origin: center;
      }

      button:not(.btn)::before {
        content: "";
        transform-origin: center;
        position: absolute;
        top: 80%;
        left: 3%;
        width: 95%;
        height: 40%;
        background-color: white;
        transition: 0.5s;
      }

      button:not(.btn):hover::before,
      button:not(.btn):hover::after {
        transform: scale(0);
      }

      button:not(.btn):hover {
        box-shadow: inset 0px 0px 25px #1479ea;
      }

      .green-button {
        display: inline-block;
        position: relative;
        height: 3.5em;
        padding: 0 1em;
        border: 3px ridge #218838;
        outline: none;
        background-color: transparent;
        color: black;
        transition: 1s;
        border-radius: 0.3em;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        white-space: nowrap;
        margin-top: 1px;
      }
      .green-button::after,
      .green-button::before {
        content: "";
        position: absolute;
        width: 95%;
        height: 40%;
        background-color: white;
        transition: 0.5s;
        transform-origin: center;
      }
      .green-button::after {
        top: -10px;
        left: 3%;
      }
      .green-button::before {
        top: 80%;
        left: 3%;
      }
      .green-button:hover::before,
      .green-button:hover::after {
        transform: scale(0);
      }
      .green-button:hover {
        box-shadow: inset 0px 0px 25px #218838;
        background-color: rgba(33, 136, 56, 0.1);
      }

      .btn {
        transition: all 0.3s ease-in-out;
        font-family: "Dosis", sans-serif;
        width: auto;
        height: 40px;
        border-radius: 5px;
        background-image: linear-gradient(
          135deg,
          #149cea 0%,
          #0d7ac2 100%
        ); /* Nuevo gradiente */
        outline: none;
        cursor: pointer;
        border: none;
        font-size: 14px;
        color: white;
        margin: 10px; /* Añade margen entre los botones */
      }

      .btn:hover {
        transform: translateY(3px);
        box-shadow: none;
      }

      .btn:active {
        opacity: 0.5;
      }

      .orange-button {
        display: inline-block;
        position: relative;
        height: 3.5em;
        padding: 0 1em;
        border: 3px ridge #ffc107;
        outline: none;
        background-color: transparent;
        color: black;
        transition: 1s;
        border-radius: 0.3em;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        white-space: nowrap;
        margin-top: 1px;
      }
      .orange-button::after,
      .orange-button::before {
        content: "";
        position: absolute;
        width: 95%;
        height: 40%;
        background-color: white;
        transition: 0.5s;
        transform-origin: center;
      }
      .orange-button::after {
        top: -10px;
        left: 3%;
      }
      .orange-button::before {
        top: 80%;
        left: 3%;
      }
      .orange-button:hover::before,
      .orange-button:hover::after {
        transform: scale(0);
      }
      .orange-button:hover {
        box-shadow: inset 0px 0px 25px #ffc107;
        background-color: rgba(33, 136, 56, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Texto</h1>
      <button class="green-button" onclick="goTo('help.html')">Texto</button>
      <button class="button" onclick="goTo('help.html')">Texto</button>
      <button class="btn" onclick="goTo('help.html')">Texto</button>
      <button class="orange-button" onclick="goTo('help.html')">Texto</button>
    </div>
    <script>
      // Función para redirigir a otra página
      function goTo(page) {
        window.location.href = page;
      }
    </script>
  </body>
</html>
