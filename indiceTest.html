<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Index Formulación</title>
    <link rel="icon" href="indice.png" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f4f8;
      }
      .container {
        text-align: center;
        background-color: #ffffff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 24px;
        color: #333;
        margin-bottom: 20px;
      }
      .btn {
        transition: all 0.3s ease-in-out;
        font-family: "Dosis", sans-serif;
        width: auto;
        height: 40px;
        border-radius: 5px;
        background-image: linear-gradient(
          135deg,
          #149cea 0%,
          #0d7ac2 100%
        ); /* Nuevo gradiente */
        outline: none;
        cursor: pointer;
        border: none;
        font-size: 14px;
        color: white;
        margin: 10px; /* Añade margen entre los botones */
        padding: 0 20px;
      }

      .btn:hover {
        transform: translateY(3px);
        box-shadow: none;
      }

      .btn:active {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Opciones del Test</h1>
      <div class="button-container">
        <button class="btn" onclick="goTo('formInor.html')">Formulación Inorgánica</button>
        <button class="btn" onclick="goTo('formOr.html')">Formulación Orgánica</button>
      </div>
    </div>
    <script>
      // Función para redirigir a otra página
      function goTo(page) {
        window.location.href = page;
      }
    </script>
  </body>
</html>
